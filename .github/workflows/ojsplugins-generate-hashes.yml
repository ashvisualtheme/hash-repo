# ------------------------------------------------------------------------------------
  # JOB 1: Temukan semua plugin yang valid dan buat daftar kerja (matrix) untuk job berikutnya
  # ------------------------------------------------------------------------------------
  discover-plugins:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    
    steps:
    - name: 🛒 Setup Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y xmlstarlet jq curl

    - name: ⬇️ Download Plugin Gallery XML
      run: |
        curl -L -o plugins.xml https://raw.githubusercontent.com/pkp/plugin-gallery/main/plugins.xml

    - name: 🔍 Generate Plugin Matrix
      id: set_matrix
      run: |
        XPATH_QUERY="//*[local-name()='plugin']/*[local-name()='release'][
            *[local-name()='compatibility'][@application='ojs2'][
                *[local-name()='version'][
                    starts-with(text(), '3.3') or starts-with(text(), '3.4') or starts-with(text(), '~3.3') or starts-with(text(), '~3.4') or starts-with(text(), '~3.5')
                ]
            ]
        ]"
        
        JSON_MATRIX=$(xmlstarlet sel -t -m "${XPATH_QUERY}" \
          -v 'ancestor::*[local-name()="plugin"]/@product' -o '|' \
          -v 'ancestor::*[local-name()="plugin"]/@category' -o '|' \
          -v '@version' -o '|' \
          -v '*[local-name()="package"]' -n \
          plugins.xml | \
          jq -R 'split("|") | {product: .[0], category: .[1], version: .[2], url: .[3]}' | \
          jq -s '.')

        # ✨ PERBAIKAN: Gunakan heredoc untuk menangani output multi-baris dengan aman
        {
          echo "matrix<<EOF"
          echo "$JSON_MATRIX"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
