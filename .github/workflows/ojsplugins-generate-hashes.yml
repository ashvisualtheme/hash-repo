name: Generate OJS Plugin Hashes (3.3+)

on:
  workflow_dispatch:
    inputs:
      target_compat_filter:
        description: 'Filter kompatibilitas (misalnya: 3.3 atau ~3.4). Default: 3.3 ke atas'
        required: false
        default: '3.3'

jobs:
  filter_and_process_plugins:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🛒 Setup Tools & Create Artifact Directory
      run: |
        # Nonaktifkan man-db trigger untuk mempercepat instalasi paket
        echo 'DPkg::Post-Invoke {"if [ -d /usr/share/man ]; then /usr/bin/mandb --quiet; fi";};' | sudo tee /etc/apt/apt.conf.d/99man-db
        echo 'APT::AutoRemove::Suggests "false";' | sudo tee -a /etc/apt/apt.conf.d/99man-db
        
        # Instal xmlstarlet (untuk parsing XML) dan jq (untuk memformat JSON)
        sudo apt-get update
        sudo apt-get install -y xmlstarlet jq wget curl
        
        # Buat direktori untuk menampung hasil artefak JSON
        mkdir -p ojs-plugin-hashes

    - name: ⬇️ Download Plugin Gallery XML
      run: |
        curl -L -o plugins.xml https://raw.githubusercontent.com/pkp/plugin-gallery/main/plugins.xml

    - name: 🔍 Filter, Download, Extract, and Hash Packages
      id: process_releases
      run: |
        # Direktori kerja sementara untuk mengunduh dan mengekstrak
        TEMP_DIR="temp_download_area"
        mkdir -p "$TEMP_DIR"

        # Tentukan filter XPath untuk rilis yang kompatibel dengan OJS 3.3.x, ~3.4.x, atau ~3.5.x
        # Kami menggunakan local-name() untuk mengabaikan namespace PKP yang rumit.
        XPATH_QUERY="//*[local-name()='plugin']/*[local-name()='release'][
            *[local-name()='compatibility'][@application='ojs2'][
                *[local-name()='version'][
                    starts-with(text(), '3.3') or starts-with(text(), '3.4') or starts-with(text(), '~3.3') or starts-with(text(), '~3.4') or starts-with(text(), '~3.5')
                ]
            ]
        ]"
        
        # 1. Ekstrak data: product, version, dan package URL
        #    Outputnya adalah baris yang dipisahkan pipa (|)
        echo "Memproses rilis dengan filter kompatibilitas: OJS 3.3+ ..."
        
        xmlstarlet sel -t -m "${XPATH_QUERY}" \
          -v 'ancestor::*[local-name()="plugin"]/@product' -o '|' \
          -v '@version' -o '|' \
          -v '*[local-name()="package"]' -n \
          plugins.xml > releases.txt

        echo "Ditemukan $(wc -l < releases.txt) rilis yang kompatibel."

        # 2. Iterasi melalui setiap rilis untuk mengunduh, menghitung hash, dan membuat JSON
        while IFS="|" read -r PRODUCT VERSION URL; do
          if [ -z "$PRODUCT" ] || [ -z "$VERSION" ] || [ -z "$URL" ]; then
            echo "Melewati baris data tidak lengkap."
            continue
          fi
          
          # Bersihkan nama file dari karakter yang tidak aman
          SAFE_PRODUCT=$(echo "$PRODUCT" | tr -d '[:space:]' | tr -cd '[:alnum:]-._')
          SAFE_VERSION=$(echo "$VERSION" | tr -d '[:space:]' | tr -cd '[:alnum:]-._')
          
          JSON_FILENAME="${SAFE_PRODUCT}-v${SAFE_VERSION}.json"
          DOWNLOADED_FILE="${TEMP_DIR}/package.tar.gz"
          EXTRACT_DIR="${TEMP_DIR}/extracted_content"

          echo "--- Memproses: $PRODUCT v$VERSION ($JSON_FILENAME) ---"
          
          # 3. Download package ke direktori sementara
          if ! wget -q "$URL" -O "$DOWNLOADED_FILE"; then
            echo "Peringatan: Gagal mengunduh $URL. Melewati."
            continue
          fi
          
          # 4. Ekstrak file dan tentukan nama direktori akar (root) setelah ekstraksi
          # Bersihkan direktori ekstrak sebelumnya
          rm -rf "$EXTRACT_DIR"
          mkdir -p "$EXTRACT_DIR"
          
          # Ekstraksi. Tambahkan pengecekan apakah file yang diunduh adalah file tar.gz
          if [[ "$URL" == *.tar.gz ]]; then
             TAR_OPTS="xzf"
          elif [[ "$URL" == *.tgz ]]; then
             TAR_OPTS="xzf"
          else
             echo "Peringatan: URL $URL bukan file .tar.gz atau .tgz yang didukung. Melewati."
             rm -f "$DOWNLOADED_FILE"
             continue
          fi
          
          if ! tar -"$TAR_OPTS" "$DOWNLOADED_FILE" -C "$EXTRACT_DIR" --warning=none; then
            echo "Peringatan: Gagal mengekstrak $DOWNLOADED_FILE. Melewati."
            rm -f "$DOWNLOADED_FILE"
            continue
          fi
          
          # Cari direktori akar (biasanya satu-satunya sub-direktori setelah ekstraksi)
          # Ini mungkin adalah direktori yang bernama 'plugin-name-version'
          ROOT_DIR=$(find "$EXTRACT_DIR" -maxdepth 1 -mindepth 1 -type d | head -n 1)
          
          if [ -z "$ROOT_DIR" ]; then
             # Jika file diekstrak langsung ke EXTRACT_DIR (tidak ada sub-dir), gunakan EXTRACT_DIR sebagai root
             ROOT_DIR="$EXTRACT_DIR"
          fi

          # Hitung hash SHA256 dan siapkan input untuk jq
          # Menggunakan sed untuk membersihkan karakter yang tidak diinginkan dan memastikan pemformatan JSON yang ketat.
          HASH_DATA=$(
            cd "$ROOT_DIR"
            # 1. Temukan semua file biasa, kecualikan file template, hitung sha256sum
            find . -type f ! -name 'config.TEMPLATE.inc.php' -print0 | xargs -0 sha256sum | \
            # 2. Awk memformat output sebagai JSON Key-Value Pair. Gunakan $1 dan $2 dari output sha256sum.
            awk '{sub(/^\.\//, "", $2); printf "[\"%s\",\"%s\"]\n", $2, $1}'
          )

          # 5. Buat JSON hanya jika ada data hash yang ditemukan
          if [ -z "$HASH_DATA" ]; then
            echo "Peringatan: Tidak ada file hash yang ditemukan dalam paket yang diekstrak. Membuat objek JSON kosong."
            echo "{}" > "ojs-plugin-hashes/$JSON_FILENAME"
          else
            # DEBUG: Cetak 5 baris pertama dari HASH_DATA sebelum diproses oleh jq
            echo "DEBUG: 5 baris pertama HASH_DATA:"
            echo "$HASH_DATA" | head -n 5
            
            # Gunakan HASH_DATA sebagai input ke jq dan simpan sebagai JSON
            if ! echo "$HASH_DATA" | jq -s 'from_entries' > "ojs-plugin-hashes/$JSON_FILENAME"; then
               echo "ERROR: Gagal memproses jq untuk $PRODUCT v$VERSION."
               echo "Data mentah yang menyebabkan kegagalan jq disimpan ke /tmp/jq_fail_raw.txt"
               echo "$HASH_DATA" > "/tmp/jq_fail_raw.txt"
               # Tidak exit dengan error agar workflow dapat mencoba yang lain, tetapi mencetak peringatan.
            fi
          fi

          # Bersihkan
          rm -rf "$EXTRACT_DIR" "$DOWNLOADED_FILE"
          
          echo "Berhasil memproses hash untuk $PRODUCT v$VERSION."
          
        done < releases.txt

    - name: 📄 List generated files
      run: ls -lhR ojs-plugin-hashes/

    - name: 📦 Upload Hashes as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ojs-3.3-plus-plugin-hashes
        path: ojs-plugin-hashes/
        if-no-files-found: warn
