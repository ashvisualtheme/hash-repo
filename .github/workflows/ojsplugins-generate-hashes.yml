name: Generate OJS Plugin Hashes (Sharded & Optimized)

on:
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------------------------
  # JOB 1: Temukan SEMUA plugin dan bagi menjadi beberapa kelompok (shard)
  # ------------------------------------------------------------------------------------
  discover-and-shard-plugins:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.create_shards.outputs.shards }}

    steps:
    - name: ­¤øÆ Setup Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y xmlstarlet jq curl

    - name: Ō¼ć’ĖÅ Download Plugin Gallery XML
      run: |
        curl -L -o plugins.xml https://raw.githubusercontent.com/pkp/plugin-gallery/main/plugins.xml

    - name: ­¤öŹ Discover Plugins and Create Shards
      id: create_shards
      run: |
        XPATH_QUERY="//*[local-name()='plugin']/*[local-name()='release'][
            *[local-name()='compatibility'][@application='ojs2'][
                *[local-name()='version'][
                    starts-with(text(), '3.3') or starts-with(text(), '3.4') or starts-with(text(), '~3.3') or starts-with(text(), '~3.4') or starts-with(text(), '~3.5')
                ]
            ]
        ]"
        
        FULL_PLUGIN_LIST=$(xmlstarlet sel -t -m "${XPATH_QUERY}" \
          -v 'ancestor::*[local-name()="plugin"]/@product' -o '|' \
          -v 'ancestor::*[local-name()="plugin"]/@category' -o '|' \
          -v '@version' -o '|' \
          -v '*[local-name()="package"]' -n \
          plugins.xml | \
          jq -R 'split("|") | {product: .[0], category: .[1], version: .[2], url: .[3]}' | \
          jq -s '.')

        echo "$FULL_PLUGIN_LIST" > full-plugin-list.json
        
        SHARD_SIZE=200
        TOTAL_PLUGINS=$(echo "$FULL_PLUGIN_LIST" | jq 'length')
        NUM_SHARDS=$(( (TOTAL_PLUGINS + SHARD_SIZE - 1) / SHARD_SIZE ))
        
        echo "Total plugin ditemukan: $TOTAL_PLUGINS"
        echo "Ukuran shard: $SHARD_SIZE"
        echo "Jumlah shard yang dibutuhkan: $NUM_SHARDS"
        
        # PERBAIKAN: Kumpulkan output 'range' ke dalam array [ ] sebelum memetakannya ke string
        SHARD_INDICES=$(jq -n --argjson count "$NUM_SHARDS" '[range($count)] | map(tostring)')
        
        echo "shards=${SHARD_INDICES}" >> $GITHUB_OUTPUT

    - name: Ō¼å’ĖÅ Upload Full Plugin List
      uses: actions/upload-artifact@v4
      with:
        name: plugin-list-artifact
        path: full-plugin-list.json
        retention-days: 1

  # ------------------------------------------------------------------------------------
  # JOB 2: Jalankan satu job untuk setiap shard secara PARALEL
  # ------------------------------------------------------------------------------------
  generate-hashes-in-shards:
    runs-on: ubuntu-latest
    needs: discover-and-shard-plugins
    strategy:
      fail-fast: false
      matrix:
        shard_index: ${{ fromJson(needs.discover-and-shard-plugins.outputs.shards) }}

    steps:
    - name: ­¤øÆ Setup Tools
      run: sudo apt-get update && sudo apt-get install -y jq wget

    - name: Ō¼ć’ĖÅ Download Full Plugin List
      uses: actions/download-artifact@v4
      with:
        name: plugin-list-artifact
        path: .
    
    - name: ŌÜÖ’ĖÅ Process Shard ${{ matrix.shard_index }}
      run: |
        SHARD_INDEX=${{ matrix.shard_index }}
        SHARD_SIZE=200
        START_INDEX=$((SHARD_INDEX * SHARD_SIZE))
        
        echo "Memproses shard #${SHARD_INDEX}, dimulai dari plugin ke-${START_INDEX}..."
        
        jq -c ". | .[$START_INDEX:$START_INDEX+$SHARD_SIZE] | .[]" full-plugin-list.json | while read -r PLUGIN_JSON; do
          PRODUCT=$(echo "$PLUGIN_JSON" | jq -r '.product')
          CATEGORY=$(echo "$PLUGIN_JSON" | jq -r '.category')
          VERSION=$(echo "$PLUGIN_JSON" | jq -r '.version')
          URL=$(echo "$PLUGIN_JSON" | jq -r '.url')
          
          SAFE_PRODUCT=$(echo "$PRODUCT" | tr -cd '[:alnum:]-._')
          SAFE_CATEGORY=$(echo "$CATEGORY" | tr -cd '[:alnum:]-._')
          STANDARDIZED_VERSION=$(echo "$VERSION" | sed 's/\.\([0-9]*\)$/-\1/')
          CLEAN_VERSION=$(echo "$STANDARDIZED_VERSION" | tr -cd '[:alnum:]-._')
          
          JSON_DIR="output/plugins/${SAFE_CATEGORY}"
          JSON_PATH="${JSON_DIR}/${SAFE_PRODUCT}-v${CLEAN_VERSION}.json"
          mkdir -p "$JSON_DIR"

          echo "--- Memproses: $PRODUCT v$VERSION ---"
          
          DOWNLOADED_FILE="package.tar.gz"
          EXTRACT_DIR="extracted_content"
          mkdir -p "$EXTRACT_DIR"

          if ! wget -q --tries=3 --timeout=30 "$URL" -O "$DOWNLOADED_FILE"; then
            echo "::warning::Gagal mengunduh $URL."
            continue
          fi
          
          if ! tar xzf "$DOWNLOADED_FILE" -C "$EXTRACT_DIR" --warning=none; then
            echo "::warning::Gagal mengekstrak $DOWNLOADED_FILE."
            echo "{}" > "$JSON_PATH"
            rm -f "$DOWNLOADED_FILE"
            continue
          fi
          
          ROOT_DIR=$(find "$EXTRACT_DIR" -maxdepth 1 -mindepth 1 -type d | head -n 1)
          if [ -z "$ROOT_DIR" ]; then ROOT_DIR="$EXTRACT_DIR"; fi
          
          cd "$ROOT_DIR"
          HASH_DATA=$(find . -type f -not -path './.git/*' ! -name 'config.TEMPLATE.inc.php' -print0 | xargs -0 sha256sum | awk '{sub(/^\.\//, "", $2); printf "{\"%s\":\"%s\"}\n", $2, $1}')
          
          if [ -z "$HASH_DATA" ]; then
            echo "{}" > "../../${JSON_PATH}"
          else
            echo "$HASH_DATA" | jq -s 'add' > "../../${JSON_PATH}"
          fi
          cd ../..
          rm -rf "$EXTRACT_DIR" "$DOWNLOADED_FILE"
        done

    - name: Ō¼å’ĖÅ Upload Hashes for Shard ${{ matrix.shard_index }}
      uses: actions/upload-artifact@v4
      with:
        name: hashes-shard-${{ matrix.shard_index }}
        path: output/
        retention-days: 1

  # ------------------------------------------------------------------------------------
  # JOB 3: Kumpulkan semua hasil dari setiap shard dan kemas menjadi satu artefak final
  # ------------------------------------------------------------------------------------
  package-artifact:
    runs-on: ubuntu-latest
    needs: generate-hashes-in-shards

    steps:
    - name: Ō¼ć’ĖÅ Download all shard artifacts
      uses: actions/download-artifact@v4
      with:
        path: ojs-plugin-hashes/
        pattern: hashes-shard-*
        merge-multiple: true

    - name: ­¤ōä List final directory structure
      run: ls -lhR ojs-plugin-hashes/

    - name: ­¤ō” Upload Final Packaged Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ojs-plugin-hashes
        path: ojs-plugin-hashes/
