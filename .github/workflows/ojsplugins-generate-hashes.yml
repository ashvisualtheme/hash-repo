name: Generate OJS Plugin Hashes (Optimized)

on:
  workflow_dispatch: # Pemicu manual dengan satu klik

jobs:
  # ------------------------------------------------------------------------------------
  # JOB 1: Temukan semua plugin yang valid dan buat daftar kerja (matrix) untuk job berikutnya
  # ------------------------------------------------------------------------------------
  discover-plugins:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }} # Output dari job ini akan menjadi input matrix untuk job berikutnya
    
    steps:
    - name: 🛒 Setup Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y xmlstarlet jq curl

    - name: ⬇️ Download Plugin Gallery XML
      run: |
        curl -L -o plugins.xml https://raw.githubusercontent.com/pkp/plugin-gallery/main/plugins.xml

    - name: 🔍 Generate Plugin Matrix
      id: set_matrix
      run: |
        # Filter XPath untuk rilis yang kompatibel dengan OJS 3.3.x, 3.4.x, atau 3.5.x
        XPATH_QUERY="//*[local-name()='plugin']/*[local-name()='release'][
            *[local-name()='compatibility'][@application='ojs2'][
                *[local-name()='version'][
                    starts-with(text(), '3.3') or starts-with(text(), '3.4') or starts-with(text(), '~3.3') or starts-with(text(), '~3.4') or starts-with(text(), '~3.5')
                ]
            ]
        ]"
        
        # Ekstrak data yang dibutuhkan (product, category, version, url) dan format menjadi JSON array
        # JSON ini akan digunakan untuk membuat job paralel secara dinamis
        JSON_MATRIX=$(xmlstarlet sel -t -m "${XPATH_QUERY}" \
          -v 'ancestor::*[local-name()="plugin"]/@product' -o '|' \
          -v 'ancestor::*[local-name()="plugin"]/@category' -o '|' \
          -v '@version' -o '|' \
          -v '*[local-name()="package"]' -n \
          plugins.xml | \
          jq -R 'split("|") | {product: .[0], category: .[1], version: .[2], url: .[3]}' | \
          jq -s '.')

        echo "matrix=${JSON_MATRIX}" >> $GITHUB_OUTPUT

  # ------------------------------------------------------------------------------------
  # JOB 2: Hasilkan hash untuk setiap plugin secara PARALEL
  # ------------------------------------------------------------------------------------
  generate-hashes:
    runs-on: ubuntu-latest
    needs: discover-plugins # Job ini bergantung pada Job 1
    strategy:
      fail-fast: false # Jika satu plugin gagal, yang lain tetap berjalan
      matrix:
        # Matrix ini diisi secara dinamis dari output Job 1
        plugin: ${{ fromJson(needs.discover-plugins.outputs.matrix) }}
        
    steps:
    - name: 🛒 Setup Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y jq wget

    - name: ⚙️ Process ${{ matrix.plugin.product }} v${{ matrix.plugin.version }}
      run: |
        # Ambil data dari matrix untuk keterbacaan
        PRODUCT="${{ matrix.plugin.product }}"
        CATEGORY="${{ matrix.plugin.category }}"
        VERSION="${{ matrix.plugin.version }}"
        URL="${{ matrix.plugin.url }}"
        
        # Bersihkan nama untuk path file yang aman
        SAFE_PRODUCT=$(echo "$PRODUCT" | tr -cd '[:alnum:]-._')
        SAFE_CATEGORY=$(echo "$CATEGORY" | tr -cd '[:alnum:]-._')
        STANDARDIZED_VERSION=$(echo "$VERSION" | sed 's/\.\([0-9]*\)$/-\1/')
        CLEAN_VERSION=$(echo "$STANDARDIZED_VERSION" | tr -cd '[:alnum:]-._')
        
        # Buat struktur direktori dan nama file JSON tujuan
        JSON_DIR="output/plugins/${SAFE_CATEGORY}"
        JSON_PATH="${JSON_DIR}/${SAFE_PRODUCT}-v${CLEAN_VERSION}.json"
        mkdir -p "$JSON_DIR"

        echo "--- Memproses: $PRODUCT (Kategori: $CATEGORY) v$VERSION ---"
        echo "URL Unduhan: $URL"
        echo "Path Tujuan: $JSON_PATH"
        
        DOWNLOADED_FILE="package.tar.gz"
        EXTRACT_DIR="extracted_content"
        mkdir -p "$EXTRACT_DIR"

        # Download
        if ! wget -q --tries=3 --timeout=30 "$URL" -O "$DOWNLOADED_FILE"; then
          echo "::error::Gagal mengunduh $URL setelah 3 percobaan."
          exit 1
        fi
        
        # Ekstrak
        if ! tar xzf "$DOWNLOADED_FILE" -C "$EXTRACT_DIR" --warning=none; then
          echo "::warning::Gagal mengekstrak $DOWNLOADED_FILE. Mungkin file korup atau bukan tar.gz."
          echo "{}" > "$JSON_PATH" # Buat file JSON kosong sebagai penanda
          exit 0 # Keluar dengan sukses agar tidak menghentikan job lain
        fi
        
        # Tentukan direktori akar setelah ekstraksi
        ROOT_DIR=$(find "$EXTRACT_DIR" -maxdepth 1 -mindepth 1 -type d | head -n 1)
        if [ -z "$ROOT_DIR" ]; then
           ROOT_DIR="$EXTRACT_DIR"
        fi
        
        # Hitung hash
        cd "$ROOT_DIR"
        HASH_DATA=$(find . -type f -not -path './.git/*' ! -name 'config.TEMPLATE.inc.php' -print0 | xargs -0 sha256sum | awk '{sub(/^\.\//, "", $2); printf "{\"%s\":\"%s\"}\n", $2, $1}')
        
        # Buat file JSON
        if [ -z "$HASH_DATA" ]; then
          echo "{}" > "../../${JSON_PATH}"
        else
          echo "$HASH_DATA" | jq -s 'add' > "../../${JSON_PATH}"
        fi

    - name: ⬆️ Upload individual hash artifact
      uses: actions/upload-artifact@v4
      with:
        name: hash-${{ matrix.plugin.product }}-${{ matrix.plugin.version }}
        path: output/
        retention-days: 1

  # ------------------------------------------------------------------------------------
  # JOB 3: Kumpulkan semua hasil dan kemas menjadi satu artefak final
  # ------------------------------------------------------------------------------------
  package-artifact:
    runs-on: ubuntu-latest
    needs: generate-hashes # Job ini bergantung pada Job 2

    steps:
    - name: ⬇️ Download all generated hash files
      uses: actions/download-artifact@v4
      with:
        path: ojs-plugin-hashes/
        pattern: hash-* # Unduh semua artefak sementara
        merge-multiple: true # Gabungkan semua artefak ke satu direktori

    - name: 📄 List final directory structure
      run: ls -lhR ojs-plugin-hashes/

    - name: 📦 Upload Final Packaged Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ojs-plugin-hashes
        path: ojs-plugin-hashes/
